name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, dev]

jobs:
  lint-api:
    name: Lint API (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check api/ --ignore E501,F401

  lint-frontend:
    name: Lint Frontend (eslint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run ESLint
        working-directory: frontend
        run: npm run lint

  test-api:
    name: Test API (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: api
        run: pip install --no-cache-dir pytest pytest-asyncio httpx

      - name: Run tests
        working-directory: api
        # No test files yet — this step will be a no-op until tests/test_*.py are added
        run: |
          if find tests -name "test_*.py" 2>/dev/null | grep -q .; then
            pytest tests/ -v
          else
            echo "No tests found — skipping"
          fi

  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint-api, lint-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: false
          tags: jobos/api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: jobos/frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
